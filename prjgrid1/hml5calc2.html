<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torah Gematria Engine</title>
    <style>
        body {
            background-color: #202124;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calc-container {
            background-color: #2d2d30;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        h2 {
            color: #00d2ff;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 1.4rem;
            background-color: #3e3e42;
            border: 2px solid #555;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            box-sizing: border-box;
            direction: rtl;
        }
        input:focus {
            border-color: #00d2ff;
            outline: none;
        }
        .word-preview {
            font-size: 1.6rem;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            color: #aaaaaa;
            margin-top: 12px;
            min-height: 2rem;
            direction: rtl;
        }
        hr {
            border: 0;
            height: 1px;
            background: #444;
            margin: 20px 0;
        }
        .result-label {
            color: #9aa0a6;
            font-size: 0.9rem;
        }
        .result-value {
            color: #34c759;
            font-size: 3.5rem;
            font-weight: bold;
            margin-top: 5px;
            font-family: Impact, sans-serif;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <h2>STANDARD GEMATRIA ENGINE</h2>
    <input type="text" id="gematriaInput" placeholder="הקלד מילה בעברית..." autofocus>
    <div class="word-preview" id="wordPreview"></div>
    <hr>
    <div class="result-label">Revealed Value:</div>
    <div class="result-value" id="resultValue">0</div>
</div>

<script>
    const gematriaMap = {
        'א': 1, 'ב': 2, 'ג': 3, 'ד': 4, 'ה': 5, 'ו': 6, 'ז': 7, 'ח': 8, 'ט': 9,
        'י': 10, 'כ': 20, 'ל': 30, 'מ': 40, 'נ': 50, 'ס': 60, 'ע': 70, 'פ': 80, 'צ': 90,
        'ק': 100, 'ר': 200, 'ש': 300, 'ת': 400,
        'ך': 20, 'ם': 40, 'ן': 50, 'ף': 80, 'ץ': 90
    };

    const inputField = document.getElementById('gematriaInput');
    const previewField = document.getElementById('wordPreview');
    const resultField = document.getElementById('resultValue');

    inputField.addEventListener('input', function() {
        const text = this.value;
        previewField.textContent = text;
        
        let total = 0;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            if (gematriaMap[char] !== undefined) {
                total += gematriaMap[char];
            }
        }
        resultField.textContent = total;
    });
</script>

</body>
</html>
